openapi: 3.1.0
info:
  title: Behavior Lab API - Phase 3 Goal-Directed Situated Behavior
  version: 0.3.0
  description: Local API contract for goals, intentions, zones, resources, and interruption-aware planning.
servers:
  - url: http://127.0.0.1:8000
paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: API healthy

  /scenarios/{scenario_id}/run:
    post:
      summary: Run simulation ticks
      operationId: runScenario
      parameters:
        - in: path
          name: scenario_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunRequest'
      responses:
        '200':
          description: Tick results

  /scenarios/{scenario_id}/goals:
    get:
      summary: List goals for a scenario
      operationId: listGoals
      parameters:
        - in: path
          name: scenario_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: agent_id
          schema:
            type: string
            format: uuid
        - in: query
          name: status
          schema:
            type: string
      responses:
        '200':
          description: Goals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Goal'

  /scenarios/{scenario_id}/intentions:
    get:
      summary: List active and historical intentions
      operationId: listIntentions
      parameters:
        - in: path
          name: scenario_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: agent_id
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Intentions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlanState'

  /scenarios/{scenario_id}/zones:
    get:
      summary: List zones and occupancy
      operationId: listZones
      parameters:
        - in: path
          name: scenario_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Zones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Zone'

  /scenarios/{scenario_id}/resources:
    get:
      summary: List resources and availability
      operationId: listResources
      parameters:
        - in: path
          name: scenario_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: zone_id
          schema:
            type: string
            format: uuid
        - in: query
          name: resource_type
          schema:
            type: string
      responses:
        '200':
          description: Resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Resource'

  /scenarios/{scenario_id}/timeline:
    get:
      summary: Timeline query with Phase 3 event filters
      operationId: getTimeline
      parameters:
        - in: path
          name: scenario_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: agent_id
          schema:
            type: string
            format: uuid
        - in: query
          name: zone_id
          schema:
            type: string
            format: uuid
        - in: query
          name: tick_from
          schema:
            type: integer
        - in: query
          name: tick_to
          schema:
            type: integer
        - in: query
          name: event_type
          schema:
            type: string
      responses:
        '200':
          description: Timeline events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SimulationEvent'

components:
  schemas:
    RunRequest:
      type: object
      properties:
        ticks:
          type: integer
          minimum: 1
      required: [ticks]
    Goal:
      type: object
      properties:
        id:
          type: string
          format: uuid
        scenario_id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        goal_type:
          type: string
        priority:
          type: number
        status:
          type: string
        target:
          type: object
        source:
          type: string
    PlanState:
      type: object
      properties:
        id:
          type: string
          format: uuid
        scenario_id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        goal_id:
          type: string
          format: uuid
          nullable: true
        current_action_type:
          type: string
        status:
          type: string
        rationale:
          type: string
        target_zone_id:
          type: string
          format: uuid
          nullable: true
        target_resource_id:
          type: string
          format: uuid
          nullable: true
    Zone:
      type: object
      properties:
        id:
          type: string
          format: uuid
        scenario_id:
          type: string
          format: uuid
        name:
          type: string
        zone_type:
          type: string
        metadata:
          type: object
        occupants:
          type: array
          items:
            type: string
            format: uuid
    Resource:
      type: object
      properties:
        id:
          type: string
          format: uuid
        scenario_id:
          type: string
          format: uuid
        zone_id:
          type: string
          format: uuid
        resource_type:
          type: string
        quantity:
          type: integer
        status:
          type: string
    SimulationEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tick_number:
          type: integer
        event_type:
          type: string
        actor_agent_id:
          type: string
          format: uuid
          nullable: true
        target_agent_id:
          type: string
          format: uuid
          nullable: true
        content:
          type: string
        payload:
          type: object
